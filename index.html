<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多平台经典游戏模拟器</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <!-- 标题 -->
    <header class="header">
      <h1>🎮 多平台经典游戏模拟器</h1>
      <p class="subtitle">支持 NES、GB、GBC 与 GBA 游戏</p>
    </header>

    <!-- 主内容区 -->
    <main class="main">
      <!-- 游戏库 -->
      <div class="game-library" id="gameLibrary">
        <h2 class="section-title">🎮 游戏库</h2>
        <div class="game-grid" id="gameGrid">
          <!-- 动态加载游戏卡片 -->
        </div>
      </div>

      <!-- 游戏画面区 -->
      <div class="screen-wrapper" id="screenWrapper">
        <canvas id="screen" width="256" height="240"></canvas>
        <!-- 未加载 ROM 时的占位 -->
        <div class="screen-placeholder" id="placeholder">
          <div class="placeholder-icon">🕹️</div>
          <p>请加载 ROM 文件开始游戏</p>
        </div>
      </div>

      <!-- 控制面板 -->
      <div class="controls">
        <!-- ROM 加载 -->
        <div class="control-group">
          <label class="file-label" for="romFile">
            📂 选择 ROM（NES / GB / GBC / GBA）
          </label>
          <input type="file" id="romFile" accept=".nes,.gb,.gbc,.gba" hidden>
          <span class="rom-name" id="romName">未选择文件</span>
        </div>

        <!-- 功能按钮 -->
        <div class="control-group buttons">
          <button id="btnStart" disabled>▶ 开始</button>
          <button id="btnPause" disabled>⏸ 暂停</button>
          <button id="btnReset" disabled>🔄 重置</button>
          <button id="btnMute" disabled>🔊 声音</button>
          <button id="btnFullscreen" disabled>⛶ 全屏</button>
        </div>

        <!-- 状态信息 -->
        <div class="control-group status">
          <span id="fpsDisplay">FPS: --</span>
          <span id="statusDisplay">就绪</span>
        </div>
      </div>

      <!-- 键位说明 -->
      <div class="keymap">
        <h3>⌨️ 操作说明（可在播放器“控制设置”中修改）</h3>
        <div class="keymap-tables">
          <div class="keymap-player">
            <h4>默认键盘</h4>
            <table>
              <tr><td>方向</td><td>↑ ↓ ← →</td></tr>
              <tr><td>A</td><td>X</td></tr>
              <tr><td>B</td><td>Z</td></tr>
              <tr><td>Start</td><td>Enter</td></tr>
              <tr><td>Select</td><td>Right Shift</td></tr>
              <tr><td>GBA L / R</td><td>A / S</td></tr>
            </table>
          </div>
          <div class="keymap-player">
            <h4>手柄与存档</h4>
            <p>支持浏览器 Gamepad 手柄。</p>
            <p>播放器工具栏可保存/加载状态，并可导入导出游戏存档。</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 错误提示弹窗 -->
  <div class="toast" id="toast"></div>

  <!-- EmulatorJS 多平台封装 -->
  <script src="js/emulator.js?v=20260715-multicore"></script>
  <script src="js/app.js?v=20260715-multicore"></script>
</body>
</html>
