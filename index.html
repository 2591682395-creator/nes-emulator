<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NES 红白机模拟器</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <!-- 标题 -->
    <header class="header">
      <h1>🎮 NES 红白机模拟器</h1>
      <p class="subtitle">在浏览器中重温经典</p>
    </header>

    <!-- 主内容区 -->
    <main class="main">
      <!-- 游戏库 -->
      <div class="game-library" id="gameLibrary">
        <h2 class="section-title">🎮 游戏库</h2>
        <div class="game-grid" id="gameGrid">
          <!-- 动态加载游戏卡片 -->
        </div>
      </div>

      <!-- 游戏画面区 -->
      <div class="screen-wrapper" id="screenWrapper">
        <canvas id="screen" width="256" height="240"></canvas>
        <!-- 未加载 ROM 时的占位 -->
        <div class="screen-placeholder" id="placeholder">
          <div class="placeholder-icon">🕹️</div>
          <p>请加载 ROM 文件开始游戏</p>
        </div>
      </div>

      <!-- 控制面板 -->
      <div class="controls">
        <!-- ROM 加载 -->
        <div class="control-group">
          <label class="file-label" for="romFile">
            📂 选择 ROM 文件 (.nes)
          </label>
          <input type="file" id="romFile" accept=".nes" hidden>
          <span class="rom-name" id="romName">未选择文件</span>
        </div>

        <!-- 功能按钮 -->
        <div class="control-group buttons">
          <button id="btnStart" disabled>▶ 开始</button>
          <button id="btnPause" disabled>⏸ 暂停</button>
          <button id="btnReset" disabled>🔄 重置</button>
          <button id="btnMute" disabled>🔊 声音</button>
          <button id="btnFullscreen" disabled>⛶ 全屏</button>
        </div>

        <!-- 状态信息 -->
        <div class="control-group status">
          <span id="fpsDisplay">FPS: --</span>
          <span id="statusDisplay">就绪</span>
        </div>
      </div>

      <!-- 键位说明 -->
      <div class="keymap">
        <h3>⌨️ 键位说明</h3>
        <div class="keymap-tables">
          <div class="keymap-player">
            <h4>玩家 1</h4>
            <table>
              <tr><td>方向</td><td>↑ ↓ ← →</td></tr>
              <tr><td>A</td><td>Z</td></tr>
              <tr><td>B</td><td>X</td></tr>
              <tr><td>Start</td><td>Enter</td></tr>
              <tr><td>Select</td><td>Right Shift</td></tr>
            </table>
          </div>
          <div class="keymap-player">
            <h4>玩家 2</h4>
            <table>
              <tr><td>方向</td><td>W A S D</td></tr>
              <tr><td>A</td><td>J</td></tr>
              <tr><td>B</td><td>K</td></tr>
              <tr><td>Start</td><td>U</td></tr>
              <tr><td>Select</td><td>I</td></tr>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 错误提示弹窗 -->
  <div class="toast" id="toast"></div>

  <!-- 加载 jsnes 模拟器库 -->
  <script src="js/jsnes.min.js"></script>
  <!-- 应用模块 -->
  <script src="js/audio.js"></script>
  <script src="js/emulator.js"></script>
  <script src="js/input.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
