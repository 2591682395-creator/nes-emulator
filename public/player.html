<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmulatorJS Player</title>
  <style>
    html, body, #game { width: 100%; height: 100%; margin: 0; background: #000; overflow: hidden; }
    #error { color: #fff; padding: 24px; font: 14px/1.6 sans-serif; }
    /* The outer PSP shell provides touch controls, so EmulatorJS's overlay is unnecessary. */
    [class*="virtualGamepad"], [id*="virtualGamepad"],
    [class*="virtual-gamepad"], [id*="virtual-gamepad"] {
      display: none !important;
      visibility: hidden !important;
      pointer-events: none !important;
      opacity: 0 !important;
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <script>
    (() => {
      const params = new URLSearchParams(location.search);
      const core = params.get("core");
      const rom = params.get("rom");
      const allowedCores = new Set(["nes", "gba", "gb"]);

      const notify = (type, message) => parent.postMessage({ type, message }, location.origin);
      if (!allowedCores.has(core) || !rom) {
        document.getElementById("game").innerHTML = '<div id="error">无效的模拟器核心或 ROM 地址</div>';
        notify("emulator-error", "无效的模拟器核心或 ROM 地址");
        return;
      }

      window.EJS_player = "#game";
      window.EJS_core = core;
      window.EJS_gameName = params.get("name") || "Game";
      window.EJS_gameUrl = rom;
      window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
      window.EJS_startOnLoaded = true;
      window.EJS_threads = false;
      window.EJS_VirtualGamepadSettings = {
        hidden: true,
        opacity: 0,
      };
      window.EJS_ready = () => notify("emulator-ready");
      window.EJS_onGameStart = () => notify("emulator-ready");

      const loader = document.createElement("script");
      loader.src = `${window.EJS_pathtodata}loader.js`;
      loader.onerror = () => notify("emulator-error", "EmulatorJS 核心下载失败");
      document.body.appendChild(loader);

      const hideBuiltInGamepad = () => {
        document.querySelectorAll(
          '[class*="virtualGamepad"], [id*="virtualGamepad"], [class*="virtual-gamepad"], [id*="virtual-gamepad"]'
        ).forEach((element) => {
          element.hidden = true;
          element.style.setProperty("display", "none", "important");
          element.style.setProperty("pointer-events", "none", "important");
        });
      };
      new MutationObserver(hideBuiltInGamepad).observe(document.body, {
        childList: true,
        subtree: true,
      });
      hideBuiltInGamepad();

      window.addEventListener("message", (event) => {
        if (event.origin !== location.origin || event.data?.type !== "emulator-control") return;
        const emulator = window.EJS_emulator;
        if (!emulator) return;
        try {
          switch (event.data.action) {
            case "play": emulator.play?.(); break;
            case "pause": emulator.pause?.(); break;
            case "restart": emulator.restart?.(); break;
            case "mute": emulator.setVolume?.(event.data.value ? 0 : 1); break;
            case "fast-forward": {
              const enabled = Boolean(event.data.value);
              const manager = emulator.gameManager;
              if (typeof manager?.setFastForward === "function") manager.setFastForward(enabled);
              else if (typeof manager?.toggleFastForward === "function") {
                if (Boolean(manager.fastForward) !== enabled) manager.toggleFastForward();
              } else if (typeof emulator.setFastForward === "function") emulator.setFastForward(enabled);
              else if (typeof emulator.toggleFastForward === "function") {
                if (Boolean(emulator.fastForward) !== enabled) emulator.toggleFastForward();
              } else if (manager) {
                manager.fastForward = enabled;
                manager.fastForwardEnabled = enabled;
              }
              break;
            }
            case "key": {
              const code = event.data.value?.code;
              const pressed = Boolean(event.data.value?.pressed);
              if (!code) break;
              const inputIndexByCode = {
                ArrowUp: 4, ArrowDown: 5, ArrowLeft: 6, ArrowRight: 7,
                Enter: 3, ShiftRight: 2, KeyA: 10, KeyS: 11, KeyX: 8, KeyZ: 0
              };
              const inputIndex = inputIndexByCode[code];
              if (Number.isInteger(inputIndex) && emulator.gameManager?.simulateInput) {
                emulator.gameManager.simulateInput(0, inputIndex, pressed ? 1 : 0);
                break;
              }
              const keyByCode = {
                ArrowUp: "ArrowUp", ArrowDown: "ArrowDown", ArrowLeft: "ArrowLeft", ArrowRight: "ArrowRight",
                KeyX: "x", KeyZ: "z", KeyA: "a", KeyS: "s", Enter: "Enter", ShiftRight: "Shift"
              };
              const keyCodeByCode = {
                ArrowUp: 38, ArrowDown: 40, ArrowLeft: 37, ArrowRight: 39,
                KeyX: 88, KeyZ: 90, KeyA: 65, KeyS: 83, Enter: 13, ShiftRight: 16
              };
              const keyboardEvent = new KeyboardEvent(pressed ? "keydown" : "keyup", {
                key: keyByCode[code] || code,
                code,
                bubbles: true,
                cancelable: true
              });
              Object.defineProperties(keyboardEvent, {
                keyCode: { get: () => keyCodeByCode[code] || 0 },
                which: { get: () => keyCodeByCode[code] || 0 }
              });
              document.dispatchEvent(keyboardEvent);
              break;
            }
          }
        } catch (error) {
          notify("emulator-error", error.message);
        }
      });
    })();
  </script>
</body>
</html>
