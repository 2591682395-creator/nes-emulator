<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>开始游戏 - NES 红白机模拟器</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/nav.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="nav-logo">🎮 NES 模拟器</a>
      <div class="nav-links">
        <a href="/" class="nav-link">首页</a>
        <a href="/pages/categories.html" class="nav-link">游戏分类</a>
        <a href="/pages/play.html" class="nav-link active">开始游戏</a>
      </div>
      <a href="/pages/admin-login.html" class="nav-admin">管理后台</a>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="main-content">
    <div class="play-layout">
      <!-- 游戏选择侧边栏 -->
      <aside class="game-sidebar">
        <div class="sidebar-header">
          <h3>🎮 游戏列表</h3>
        </div>
        <div class="game-list" id="gameList">
          <!-- 动态加载 -->
        </div>
      </aside>

      <!-- 游戏主区域 -->
      <div class="game-main">
        <!-- 游戏信息 -->
        <div class="game-info" id="gameInfo" style="display: none;">
          <h2 id="gameTitle">-</h2>
          <span class="game-category" id="gameCategory">-</span>
          <span class="game-plays" id="gamePlays">0 次游玩</span>
        </div>

        <!-- 游戏画面区 -->
        <div class="screen-wrapper" id="screenWrapper">
          <canvas id="screen" width="256" height="240"></canvas>
          <!-- 未加载 ROM 时的占位 -->
          <div class="screen-placeholder" id="placeholder">
            <div class="placeholder-icon">🕹️</div>
            <p>请从左侧选择游戏或加载 ROM 文件</p>
          </div>
        </div>

        <!-- 控制面板 -->
        <div class="controls">
          <!-- ROM 加载 -->
          <div class="control-group">
            <label class="file-label" for="romFile">
              📂 本地 ROM 文件
            </label>
            <input type="file" id="romFile" accept=".nes,.gb,.gbc,.gba" hidden>
            <span class="rom-name" id="romName">未选择文件</span>
          </div>

          <!-- 功能按钮 -->
          <div class="control-group buttons">
            <button id="btnStart" disabled>▶ 开始</button>
            <button id="btnPause" disabled>⏸ 暂停</button>
            <button id="btnReset" disabled>🔄 重置</button>
            <button id="btnMute" disabled>🔊 声音</button>
            <button id="btnFullscreen" disabled>⛶ 全屏</button>
          </div>

          <!-- 状态信息 -->
          <div class="control-group status">
            <span id="fpsDisplay">FPS: --</span>
            <span id="statusDisplay">就绪</span>
          </div>
        </div>

        <!-- 键位说明 -->
        <div class="keymap">
          <h3>⌨️ 操作说明</h3>
          <div class="keymap-tables">
            <div class="keymap-player">
              <h4>键盘控制</h4>
              <table>
                <tr><td>方向</td><td>↑ ↓ ← →</td></tr>
                <tr><td>A</td><td>X</td></tr>
                <tr><td>B</td><td>Z</td></tr>
                <tr><td>Start</td><td>Enter</td></tr>
                <tr><td>Select</td><td>Right Shift</td></tr>
              </table>
            </div>
            <div class="keymap-player">
              <h4>其他</h4>
              <p>支持浏览器 Gamepad 手柄</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- 错误提示弹窗 -->
  <div class="toast" id="toast"></div>

  <!-- EmulatorJS 多平台封装 -->
  <script src="/js/emulator.js"></script>
  <script src="/js/play.js"></script>

  <script>
    // 加载游戏列表
    async function loadGameList() {
      try {
        const res = await fetch('/api/games?pageSize=50');
        const data = await res.json();
        if (data.code === 0 && data.data.list.length) {
          document.getElementById('gameList').innerHTML = data.data.list.map(game => `
            <div class="game-list-item" data-id="${game.id}" data-title="${game.title}"
                 data-category="${game.category_name || '未分类'}" data-plays="${game.play_count || 0}">
              <img src="${game.cover_path || '/uploads/covers/default.svg'}"
                   alt="${game.title}" class="game-list-cover"
                   onerror="this.src='/uploads/covers/default.svg'">
              <div class="game-list-info">
                <div class="game-list-title">${game.title}</div>
                <div class="game-list-meta">${game.category_name || '未分类'}</div>
              </div>
            </div>
          `).join('');

          // 绑定点击事件
          document.querySelectorAll('.game-list-item').forEach(item => {
            item.addEventListener('click', () => {
              document.querySelectorAll('.game-list-item').forEach(i => i.classList.remove('active'));
              item.classList.add('active');
              loadGameFromServer(item.dataset.id, item.dataset.title,
                                 item.dataset.category, item.dataset.plays);
            });
          });

          // 检查 URL 参数
          const urlParams = new URLSearchParams(window.location.search);
          const gameId = urlParams.get('id');
          if (gameId) {
            const target = document.querySelector(`.game-list-item[data-id="${gameId}"]`);
            if (target) {
              target.click();
            }
          }
        }
      } catch (e) {
        console.error('加载游戏列表失败:', e);
      }
    }

    // 从服务器加载游戏
    async function loadGameFromServer(gameId, gameTitle, category, plays) {
      // 更新游戏信息
      document.getElementById('gameInfo').style.display = 'flex';
      document.getElementById('gameTitle').textContent = gameTitle;
      document.getElementById('gameCategory').textContent = category;
      document.getElementById('gamePlays').textContent = `${plays} 次游玩`;

      showToast(`正在加载: ${gameTitle}...`);

      try {
        const res = await fetch(`/api/games/${gameId}/download`);
        if (!res.ok) throw new Error("下载失败");

        const blob = await res.blob();
        const arrayBuffer = await blob.arrayBuffer();

        // 启动音频
        await audio.start();

        // 加载 ROM
        const success = emulator.loadROM(arrayBuffer);
        if (success) {
          romLoaded = true;
          currentGameId = gameId;
          placeholder.classList.add("hidden");
          romNameDisplay.textContent = gameTitle;
          showToast(`已加载: ${gameTitle}`);
          updateButtons();

          // 自动开始
          emulator.start();
          input.start();
          isRunning = true;
          updateButtons();
        } else {
          showToast("ROM 加载失败");
        }
      } catch (e) {
        console.error("加载游戏失败:", e);
        showToast("加载失败: " + e.message);
      }
    }

    // 初始化
    loadGameList();
  </script>
</body>
</html>
