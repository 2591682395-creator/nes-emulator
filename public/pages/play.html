<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>游戏机｜童年游戏厅</title>
  <link rel="stylesheet" href="/css/style.css"><link rel="stylesheet" href="/css/nav.css">
</head>
<body class="play-page">
  <button class="mobile-library-button" id="openGameDrawer" aria-controls="gameDrawer" aria-expanded="false"><span>▤</span> 选择游戏</button>
  <div class="drawer-backdrop" id="drawerBackdrop" hidden></div>
  <div class="rotate-notice" aria-hidden="true"><span>↻</span><strong>请将手机竖起来</strong><small>竖屏模式拥有更好的操作空间</small></div>
  <nav class="navbar" aria-label="主导航"><div class="nav-container">
    <a href="/" class="nav-logo"><span class="logo-mark">8</span><span>童年游戏厅</span></a>
    <div class="nav-links"><a href="/" class="nav-link">首页</a><a href="/pages/categories.html" class="nav-link">游戏分类</a><a href="/pages/play.html" class="nav-link active" aria-current="page">游戏机</a></div>
    <a href="/pages/admin-login.html" class="nav-admin">管理入口</a>
  </div></nav>

  <main class="main-content play-content">
    <header class="play-heading">
      <div><span class="eyebrow">NOW PLAYING</span><h1>选择你的掌机</h1></div>
      <div class="console-switcher" role="group" aria-label="选择游戏机样式">
        <button class="console-option active" data-console="pixel" aria-pressed="true"><span>▣</span> PIXEL BOY</button>
        <button class="console-option" data-console="psp" aria-pressed="false"><span>◉</span> PSP</button>
      </div>
    </header>
    <div class="play-layout">
      <aside class="game-sidebar" id="gameDrawer" aria-label="游戏选择抽屉">
        <div class="sidebar-header"><div><span class="status-dot"></span><h2>选择游戏</h2></div><div class="drawer-header-actions"><span id="libraryCount">0 款</span><button class="drawer-close" id="closeGameDrawer" aria-label="关闭游戏抽屉">×</button></div></div>
        <label class="sidebar-search"><span>⌕</span><input type="search" id="gameSearch" placeholder="查找卡带..."></label>
        <div class="game-list" id="gameList" aria-live="polite"><div class="list-message">正在整理卡带...</div></div>
      </aside>

      <section class="game-machine pixel-console" id="gameMachine" aria-label="Pixel Boy 网页游戏机">
        <div class="machine-top"><div class="speaker"><i></i><i></i><i></i><i></i></div><div class="brand" id="machineBrand">PIXEL BOY <small>COLOR</small></div><span class="power-light">POWER</span></div>
        <button class="psp-shoulder psp-shoulder-left console-key" data-game-key="KeyA" aria-label="L 肩键">L</button><button class="psp-shoulder psp-shoulder-right console-key" data-game-key="KeyS" aria-label="R 肩键">R</button>
        <div class="screen-bezel">
          <div class="game-info" id="gameInfo" hidden><h2 id="gameTitle">未选择游戏</h2><span id="gameCategory">等待装入</span><span id="gamePlays">0 次游玩</span></div>
          <div class="screen-wrapper" id="screenWrapper"><canvas id="screen" width="256" height="240"></canvas><div class="screen-placeholder" id="placeholder"><div class="placeholder-pixels">▲</div><strong>INSERT GAME</strong><p>从左侧选择卡带<br>或加载本地 ROM</p></div></div>
          <div class="screen-status"><span id="fpsDisplay">核心: --</span><span id="statusDisplay">等待装入卡带</span></div>
        </div>

        <div class="machine-controls">
          <div class="left-controls">
            <div class="dpad-control" aria-label="方向键">
              <button class="console-key dpad-up" data-game-key="ArrowUp" aria-label="上">▲</button>
              <button class="console-key dpad-left" data-game-key="ArrowLeft" aria-label="左">◀</button>
              <span class="dpad-center"></span>
              <button class="console-key dpad-right" data-game-key="ArrowRight" aria-label="右">▶</button>
              <button class="console-key dpad-down" data-game-key="ArrowDown" aria-label="下">▼</button>
            </div>
            <button class="analog-stick console-key" data-game-key="analog" aria-label="PSP 方向摇杆"></button>
          </div>
          <div class="center-controls">
            <label for="romFile" class="file-label">+ 本地 ROM</label><input type="file" id="romFile" accept=".nes,.gb,.gbc,.gba" hidden><span class="rom-name" id="romName">未选择文件</span>
            <div class="system-keys"><button class="console-key" data-game-key="ShiftRight">SELECT</button><button class="console-key" data-game-key="Enter">START</button></div>
            <div class="utility-keys"><button id="btnPause" disabled>PAUSE</button><button id="btnFullscreen" disabled>全屏</button></div>
          </div>
          <div class="action-controls" aria-label="动作按键">
            <button class="console-key action-y" data-game-key="KeyX" aria-label="Y 键">△<small>Y</small></button>
            <button class="console-key action-x" data-game-key="KeyX" aria-label="A 键">○<small>A</small></button>
            <button class="console-key action-b" data-game-key="KeyZ" aria-label="B 键">×<small>B</small></button>
            <button class="console-key action-a" data-game-key="KeyZ" aria-label="X 键">□<small>X</small></button>
          </div>
        </div>
        <div class="machine-utilities"><button id="btnReset" disabled>↻ 重置</button><button id="btnMute" disabled>♪ 声音</button></div>
      </section>

      <aside class="help-panel"><span class="section-kicker">操作指南</span><h2>实体按键</h2><p class="control-status"><span></span>机身按钮已连接</p><dl class="key-list"><div><dt>移动</dt><dd><kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd></dd></div><div><dt>A / B</dt><dd><kbd>X</kbd><kbd>Z</kbd></dd></div><div><dt>开始 / 选择</dt><dd><kbd>Enter</kbd><kbd>Shift</kbd></dd></div></dl><p class="help-note">可以直接点击或触摸掌机按钮。键盘操作时，对应的机身按键也会同步下沉。</p></aside>
    </div>
  </main>
  <div class="toast" id="toast" role="status"></div>
  <script src="/js/emulator.js"></script><script src="/js/play.js"></script>
</body>
</html>
