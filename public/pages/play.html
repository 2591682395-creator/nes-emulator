<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>游戏机｜童年游戏厅</title>
  <link rel="stylesheet" href="/css/style.css"><link rel="stylesheet" href="/css/nav.css">
</head>
<body class="play-page">
  <nav class="navbar" aria-label="主导航"><div class="nav-container">
    <a href="/" class="nav-logo"><span class="logo-mark">8</span><span>童年游戏厅</span></a>
    <div class="nav-links"><a href="/" class="nav-link">首页</a><a href="/pages/categories.html" class="nav-link">游戏分类</a><a href="/pages/play.html" class="nav-link active" aria-current="page">游戏机</a></div>
    <a href="/pages/admin-login.html" class="nav-admin">管理入口</a>
  </div></nav>

  <main class="main-content play-content">
    <header class="play-heading"><div><span class="eyebrow">NOW PLAYING</span><h1>口袋游戏机</h1></div><p>从卡带架选择游戏，或装入你自己的 ROM。</p></header>
    <div class="play-layout">
      <aside class="game-sidebar">
        <div class="sidebar-header"><div><span class="status-dot"></span><h2>卡带架</h2></div><span id="libraryCount">0 款</span></div>
        <label class="sidebar-search"><span>⌕</span><input type="search" id="gameSearch" placeholder="查找卡带..."></label>
        <div class="game-list" id="gameList" aria-live="polite"><div class="list-message">正在整理卡带...</div></div>
      </aside>

      <section class="game-machine" aria-label="网页游戏机">
        <div class="machine-top"><div class="speaker"><i></i><i></i><i></i><i></i></div><div class="brand">PIXEL BOY <small>COLOR</small></div><span class="power-light">POWER</span></div>
        <div class="screen-bezel">
          <div class="game-info" id="gameInfo" hidden><h2 id="gameTitle">未选择游戏</h2><span id="gameCategory">等待装入</span><span id="gamePlays">0 次游玩</span></div>
          <div class="screen-wrapper" id="screenWrapper"><canvas id="screen" width="256" height="240"></canvas><div class="screen-placeholder" id="placeholder"><div class="placeholder-pixels">▲</div><strong>INSERT GAME</strong><p>从左侧选择卡带<br>或加载本地 ROM</p></div></div>
          <div class="screen-status"><span id="fpsDisplay">核心: --</span><span id="statusDisplay">等待装入卡带</span></div>
        </div>
        <div class="machine-controls">
          <div class="dpad-large" aria-hidden="true"><i></i></div>
          <div class="center-controls"><label for="romFile" class="file-label">+ 本地 ROM</label><input type="file" id="romFile" accept=".nes,.gb,.gbc,.gba" hidden><span class="rom-name" id="romName">未选择文件</span><div><button id="btnStart" disabled>START</button><button id="btnPause" disabled>PAUSE</button></div></div>
          <div class="action-controls"><button id="btnReset" disabled aria-label="重置游戏">B<small>重置</small></button><button id="btnMute" disabled aria-label="切换声音">A<small>声音</small></button></div>
        </div>
        <button class="fullscreen-button" id="btnFullscreen" disabled>▣ 全屏游玩</button>
      </section>

      <aside class="help-panel"><span class="section-kicker">操作指南</span><h2>键盘按键</h2><dl class="key-list"><div><dt>移动</dt><dd><kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd></dd></div><div><dt>A / B</dt><dd><kbd>X</kbd><kbd>Z</kbd></dd></div><div><dt>开始</dt><dd><kbd>Enter</kbd></dd></div><div><dt>选择</dt><dd><kbd>Shift</kbd></dd></div></dl><p class="help-note">也支持浏览器识别的游戏手柄。点击游戏画面后即可操作。</p></aside>
    </div>
  </main>
  <div class="toast" id="toast" role="status"></div>
  <script src="/js/emulator.js"></script><script src="/js/play.js"></script>
</body>
</html>
