<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>游戏分类｜童年游戏厅</title>
  <link rel="stylesheet" href="/css/style.css"><link rel="stylesheet" href="/css/nav.css">
</head>
<body class="catalog-page">
  <nav class="navbar" aria-label="主导航"><div class="nav-container">
    <a href="/" class="nav-logo"><span class="logo-mark">8</span><span>童年游戏厅</span></a>
    <div class="nav-links"><a href="/" class="nav-link">首页</a><a href="/pages/categories.html" class="nav-link active" aria-current="page">游戏分类</a><a href="/pages/play.html" class="nav-link">游戏机</a></div>
    <a href="/pages/account.html" class="nav-admin" data-account-link>登录</a>
  </div></nav>
  <main class="main-content">
    <header class="page-header catalog-header"><span class="eyebrow">GAME LIBRARY</span><h1>今天想玩哪一类？</h1><p>从动作闯关到角色扮演，翻一翻属于你的童年卡带盒。</p></header>
    <section class="filter-panel" aria-label="筛选游戏">
      <div class="category-tabs" id="categoryTabs"><button class="tab-btn active" data-id="all">全部游戏</button></div>
      <label class="search-box"><span aria-hidden="true">⌕</span><input type="search" id="searchInput" placeholder="搜索游戏名称..." autocomplete="off"></label>
    </section>
    <div class="result-bar"><p><span id="resultCount">0</span> 款游戏等待开始</p><span class="pixel-rule"></span></div>
    <section class="game-grid catalog-grid" id="gameGrid" aria-live="polite"><div class="empty-state">正在读取卡带目录...</div></section>
    <div class="load-more" id="loadMore" hidden><button class="btn btn-secondary" id="loadMoreButton">加载更多</button></div>
  </main>
  <footer class="footer"><span>© 2026 童年游戏厅</span><span>找到喜欢的游戏，就按下开始吧。</span></footer>
  <script src="/js/account-nav.js"></script><script src="/js/catalog.js"></script>
</body>
</html>
