<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台登录 - NES 红白机模拟器</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/nav.css">
  <style>
    .login-container {
      max-width: 400px;
      margin: 80px auto;
      background: #16213e;
      border-radius: 16px;
      padding: 40px;
    }
    .login-title {
      text-align: center;
      font-size: 24px;
      color: #e0e0e0;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      color: #888;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: #0a0a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
    }
    .form-group input:focus {
      outline: none;
      border-color: #e94560;
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover {
      background: #c73a52;
    }
    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .login-error {
      color: #ff4d4f;
      font-size: 13px;
      text-align: center;
      margin-top: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="nav-logo">🎮 NES 模拟器</a>
      <div class="nav-links">
        <a href="/" class="nav-link">首页</a>
        <a href="/pages/categories.html" class="nav-link">游戏分类</a>
        <a href="/pages/play.html" class="nav-link">开始游戏</a>
      </div>
      <a href="/pages/admin-login.html" class="nav-admin active">管理后台</a>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="main-content">
    <div class="login-container">
      <h1 class="login-title">🔐 管理后台登录</h1>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">用户名</label>
          <input type="text" id="username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="login-btn" id="loginBtn">登录</button>
        <p class="login-error" id="loginError"></p>
      </form>
    </div>
  </main>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('loginError');

      btn.disabled = true;
      btn.textContent = '登录中...';
      errorEl.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();

        if (data.code === 0) {
          if (data.data.user.role !== 'admin') {
            errorEl.textContent = '需要管理员权限';
            errorEl.style.display = 'block';
          } else {
            localStorage.setItem('admin_token', data.data.token);
            localStorage.setItem('admin_user', JSON.stringify(data.data.user));
            window.location.href = '/admin/';
          }
        } else {
          errorEl.textContent = data.message || '登录失败';
          errorEl.style.display = 'block';
        }
      } catch (e) {
        errorEl.textContent = '网络错误';
        errorEl.style.display = 'block';
      }

      btn.disabled = false;
      btn.textContent = '登录';
    });
  </script>
</body>
</html>
