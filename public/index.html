<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NES 红白机模拟器 - 首页</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/nav.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="nav-logo">🎮 NES 模拟器</a>
      <div class="nav-links">
        <a href="/" class="nav-link active">首页</a>
        <a href="/pages/categories.html" class="nav-link">游戏分类</a>
        <a href="/pages/play.html" class="nav-link">开始游戏</a>
      </div>
      <a href="/pages/admin-login.html" class="nav-admin">管理后台</a>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="main-content">
    <!-- Hero 区域 -->
    <section class="hero">
      <div class="hero-content">
        <h1 class="hero-title">🎮 经典红白机游戏</h1>
        <p class="hero-subtitle">在浏览器中重温童年经典，无需下载，即点即玩</p>
        <div class="hero-buttons">
          <a href="/pages/play.html" class="btn btn-primary">开始游戏</a>
          <a href="/pages/categories.html" class="btn btn-secondary">浏览游戏</a>
        </div>
      </div>
    </section>

    <!-- 热门游戏 -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">🔥 热门游戏</h2>
        <a href="/pages/categories.html" class="view-all">查看全部 →</a>
      </div>
      <div class="game-grid" id="hotGames">
        <!-- 动态加载 -->
      </div>
    </section>

    <!-- 最新游戏 -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">🆕 最新游戏</h2>
        <a href="/pages/categories.html" class="view-all">查看全部 →</a>
      </div>
      <div class="game-grid" id="newGames">
        <!-- 动态加载 -->
      </div>
    </section>

    <!-- 游戏分类 -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">📂 游戏分类</h2>
        <a href="/pages/categories.html" class="view-all">查看全部 →</a>
      </div>
      <div class="category-grid" id="categories">
        <!-- 动态加载 -->
      </div>
    </section>
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <p>© 2026 NES 红白机模拟器 - 在浏览器中重温经典</p>
  </footer>

  <script>
    // 加载热门游戏
    async function loadHotGames() {
      try {
        const res = await fetch('/api/games?pageSize=6');
        const data = await res.json();
        if (data.code === 0 && data.data.list.length) {
          document.getElementById('hotGames').innerHTML = data.data.list.map(game => createGameCard(game)).join('');
        }
      } catch (e) {
        console.error('加载游戏失败:', e);
      }
    }

    // 加载最新游戏
    async function loadNewGames() {
      try {
        const res = await fetch('/api/games?pageSize=6');
        const data = await res.json();
        if (data.code === 0 && data.data.list.length) {
          document.getElementById('newGames').innerHTML = data.data.list.map(game => createGameCard(game)).join('');
        }
      } catch (e) {
        console.error('加载游戏失败:', e);
      }
    }

    // 加载分类
    async function loadCategories() {
      try {
        const res = await fetch('/api/categories');
        const data = await res.json();
        if (data.code === 0 && data.data.length) {
          document.getElementById('categories').innerHTML = data.data.map(cat => `
            <a href="/pages/categories.html?cat=${cat.id}" class="category-card">
              <span class="category-icon">${cat.icon}</span>
              <span class="category-name">${cat.name}</span>
              <span class="category-count">${cat.game_count} 款游戏</span>
            </a>
          `).join('');
        }
      } catch (e) {
        console.error('加载分类失败:', e);
      }
    }

    // 创建游戏卡片
    function createGameCard(game) {
      return `
        <a href="/pages/play.html?id=${game.id}" class="game-card">
          <div class="game-card-cover-wrapper">
            <img class="game-card-cover"
                 src="${game.cover_path || '/uploads/covers/default.svg'}"
                 alt="${game.title}"
                 onerror="this.src='/uploads/covers/default.svg'">
            <div class="game-card-title-tag">
              <span>${game.title}</span>
            </div>
          </div>
          <div class="game-card-info">
            <div class="game-card-meta">
              <span class="game-card-tag">${game.category_name || '未分类'}</span>
              <span>${game.play_count || 0} 次</span>
            </div>
          </div>
        </a>
      `;
    }

    // 初始化
    loadHotGames();
    loadNewGames();
    loadCategories();
  </script>
</body>
</html>
